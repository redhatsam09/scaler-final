name: data-cleaning-env
version: 1.0.0
description: Multi-app enterprise orchestration environment with schema drift and actor coordination
author: OpenEnv Community
openenv_version: "1.0"

observation_model: src.models.Observation
action_model: src.models.Action
reward_model: src.models.Reward

env_path: src.environment:DataCleaningEnv

tasks:
  - id: task_missing_values
    name: Missing Values Detection and Imputation Strategy
    description: Identify missing values in dataset and recommend imputation approach
    difficulty: easy
    grader: src.graders:MissingValuesGrader

  - id: task_duplicate_handling
    name: Duplicate Detection and Removal
    description: Identify duplicates and apply appropriate deduplication strategy
    difficulty: medium
    grader: src.graders:DuplicateHandlingGrader

  - id: task_complex_validation
    name: Complex Data Quality Validation
    description: Comprehensive validation including type checks, domain rules, and quality metrics
    difficulty: hard
    grader: src.graders:ComplexValidationGrader

  - id: task_enterprise_orchestration
    name: Multi-App Enterprise Workflow Orchestration
    description: Coordinate CRM, Billing, and Support workflows under schema drift and actor escalations
    difficulty: hard
    grader: src.graders:EnterpriseOrchestrationGrader

features:
  max_steps: 60
  episode_timeout: 300
